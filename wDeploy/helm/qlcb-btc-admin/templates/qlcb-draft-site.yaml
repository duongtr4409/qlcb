### EMP ###

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ printf "%s-deploy" .Values.draftSite.emp.name }}
  namespace: {{ .Values.namespaceName | default "qlcb-btc" }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.draftSite.emp.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.draftSite.emp.name }}
    spec:
      volumes:
        - name: qlcb-storage
          persistentVolumeClaim:
            claimName: qlcb-btc-pvc
      imagePullSecrets:
        - name: {{ .Values.harborCredentials.secretName }}
      containers:
        - name: {{ .Values.draftSite.emp.name }}
          image: {{ printf "%s/%s/%s:%s" .Values.harborCredentials.server .Values.harborCredentials.projectName .Values.draftSite.emp.image.name .Values.draftSite.emp.image.tag }}
          resources:
            requests:
              memory: "100Mi"
            limits:
              memory: {{ .Values.draftSite.emp.limit.memory | default "2048Mi" }}
          ports:
            - containerPort: {{ .Values.draftSite.emp.port.containerPort | default "8913" }}
          volumeMounts:
            - name: qlcb-storage
              mountPath: /app/config.properties
              subPath: ./common-config-draft/config.properties
              readOnly: true
            - name: qlcb-storage
              mountPath: /config
              subPath: ./hr-emp-service/config
              readOnly: true
            - name: qlcb-storage
              mountPath: /app/logs
              subPath: ./hr-emp-service/logs
            - name: qlcb-storage
              mountPath: /home/2bs/Downloads/pc/application/BTC/be/data/file
              subPath: ./data/file

---

apiVersion: v1
kind: Service
metadata:
  name: {{ printf "%s-svc" .Values.draftSite.emp.name }}
  namespace: {{ .Values.namespaceName | default "qlcb-btc" }}
spec:
  selector:
    app: {{ .Values.draftSite.emp.name }}
  ports:
    # - protocol: TCP
    - port: {{ .Values.draftSite.emp.port.servicePort | default "8913" }}
      targetPort: {{ .Values.draftSite.emp.port.containerPort | default "8913" }}
      nodePort:  {{ .Values.draftSite.emp.port.serviceNodePort | default "31813" }}
  type: NodePort
  externalTrafficPolicy: Local


---




