
### ADMIN - EMP ###  
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emp-qlcb-admin-deploy
  namespace: qlcb-btc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emp-qlcb-admin
  template:
    metadata:
      labels:
        app: emp-qlcb-admin
    spec:
      volumes:
        - name: qlcb-storage
          persistentVolumeClaim:
            claimName: qlcb-btc-pvc
      containers: 
        - name: qlcb-hr-emp-service
          image: qlcb-hr-emp-service:20260331
          ports:
            - containerPort: 8913
          volumeMounts:
            - name: qlcb-storage
              mountPath: /app/config.properties
              subPath: ./common-config/config.properties
              readOnly: true
            - name: qlcb-storage
              mountPath: /config
              subPath: ./hr-emp-service/config
              readOnly: true
            - name: qlcb-storage
              mountPath: /app/logs
              subPath: ./hr-emp-service/logs
            - name: qlcb-storage
              mountPath: /home/2bs/Downloads/pc/application/BTC/be/data/file
              subPath: ./data/file

---

apiVersion: v1
kind: Service
metadata:
  name: emp-qlcb-admin-svc     
  namespace: qlcb-btc
spec:
  selector:
    app: emp-qlcb-admin
  ports:
    # - protocol: TCP
    - port: 8913           
      targetPort: 8913     
      nodePort: 32913
  type: NodePort          


---



