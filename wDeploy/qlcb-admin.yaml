      labels:
        app: file-qlcb
    spec:
      volumes:
        - name: qlcb-storage
          persistentVolumeClaim:
            claimName: qlcb-btc-pvc
      containers: 
        - name: qlcb-file-storage
          image: qlcb-file-storage:20260203
          ports:
            - containerPort: 8911
          volumeMounts:
            - name: qlcb-storage
              mountPath: /app/config.properties
              subPath: ./common-config/config.properties
              readOnly: true
            - name: qlcb-storage
              mountPath: /config
              subPath: ./file-storage/config
              readOnly: true
            - name: qlcb-storage
              mountPath: /app/logs
              subPath: ./file-storage/logs
            - name: qlcb-storage
              mountPath: /home/2bs/Downloads/pc/application/BTC/be/data/file
              subPath: ./data/file
            - name: qlcb-storage
              mountPath: /data
              subPath: ./file-storage/data

